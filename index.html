<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Сканер DataMatrix</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: system-ui;
      }

      #video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      .scan-area {
        position: relative;
        width: 260px;
        height: 260px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.55);
        z-index: 2;
        overflow: hidden;
      }

      .laser {
        width: 100%;
        height: 2px;
        background: #33a852;
        box-shadow: 0 0 10px #33a852;
        position: absolute;
        top: 0;
        animation: scan 2s infinite linear alternate;
      }

      @keyframes scan {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(258px);
        }
      }

      #hint {
        margin-top: 40px;
        color: white;
        font-size: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        border-radius: 20px;
        z-index: 2;
      }
    </style>
  </head>

  <body>
    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>

      <div class="scan-area">
        <div class="laser"></div>
      </div>

      <div id="hint">Наведите камеру на код</div>
    </div>

    <script>
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const codeReader = new ZXing.BrowserMultiFormatReader();

      const video = document.getElementById("video");
      const hint = document.getElementById("hint");

      let track = null;
      let torchEnabled = false;

      init();

      async function init() {
        try {
          /* один запрос разрешения */

          await navigator.mediaDevices.getUserMedia({ video: true });

          /* список камер */

          const devices = await codeReader.listVideoInputDevices();

          let deviceId = devices[0].deviceId;

          /* ищем заднюю камеру */

          for (const d of devices) {
            const label = d.label.toLowerCase();

            if (
              label.includes("back") ||
              label.includes("rear") ||
              label.includes("environment")
            ) {
              deviceId = d.deviceId;
              break;
            }
          }

          /* высокое разрешение */

          const constraints = {
            video: {
              deviceId: deviceId,
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              focusMode: "continuous",
            },
          };

          const stream = await navigator.mediaDevices.getUserMedia(constraints);

          video.srcObject = stream;

          track = stream.getVideoTracks()[0];

          optimizeCamera();

          startDecode();
        } catch (err) {
          hint.innerText = "Ошибка камеры: " + err.message;
        }
      }

      function startDecode() {
        codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
          if (result) {
            if (navigator.vibrate) navigator.vibrate(200);

            hint.innerText = "Код считан";

            window.Telegram.WebApp.sendData(result.text);

            setTimeout(() => {
              window.Telegram.WebApp.close();
            }, 500);
          }
        });
      }

      /* оптимизация камеры */

      async function optimizeCamera() {
        try {
          const capabilities = track.getCapabilities();

          /* автофокус */

          if (capabilities.focusMode) {
            await track.applyConstraints({
              advanced: [{ focusMode: "continuous" }],
            });
          } else {
            hint.innerText =
              "ваша камера не имеет автофокуса пожалуйста поднесите qr ближе";
          }

          /* zoom */

          if (capabilities.zoom) {
            await track.applyConstraints({
              advanced: [{ zoom: capabilities.zoom.max / 2 }],
            });
          }

          /* автофонарик */

          if (capabilities.torch) {
            setTimeout(async () => {
              if (!torchEnabled) {
                torchEnabled = true;

                await track.applyConstraints({
                  advanced: [{ torch: true }],
                });
              }
            }, 2500);
          }
        } catch (e) {}
      }
    </script>
  </body>
</html>
