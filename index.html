<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер штрихкодов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <script>
        // Сообщаем Telegram, что приложение готово
        window.Telegram.WebApp.ready();

        const params = {
            text: "Наведите камеру на штрихкод товара"
        };

        // Запускаем сканер
        window.Telegram.WebApp.showScanQrPopup(params, function(scannedText) {
            // Отправляем отсканированный текст обратно в бота (и следовательно, на сервер 1С)
            window.Telegram.WebApp.sendData(scannedText);
            
            // Возвращаем true, чтобы сканер закрылся после успешного чтения
            return true;
        });
    </script>
</body>
</html>
