<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Сканер DataMatrix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: system-ui;
      }
      #video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }
      .scan-area {
        position: relative;
        width: 260px;
        height: 260px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.55);
        z-index: 2;
        overflow: hidden;
      }
      .mini-area {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        border: 2px solid #fff;
        border-radius: 10px;
      }
      .laser {
        width: 100%;
        height: 2px;
        background: #33a852;
        box-shadow: 0 0 10px #33a852;
        position: absolute;
        top: 0;
        animation: scan 2s infinite linear alternate;
      }
      @keyframes scan {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(258px);
        }
      }
      #hint {
        margin-top: 40px;
        color: white;
        font-size: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        border-radius: 20px;
        z-index: 2;
        text-align: center;
        max-width: 300px;
      }
      #flashBtn {
        position: absolute;
        bottom: 40px;
        z-index: 4;
        background: #fff;
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>
      <div class="scan-area">
        <div class="laser"></div>
        <div class="mini-area"></div>
      </div>
      <div id="hint">
        Держите объект на расстоянии 10-15 см и наведите внутреннюю рамку на QR
        код
      </div>
      <button id="flashBtn">🔦 Фонарик</button>
    </div>

    <script>
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const video = document.getElementById("video");
      const codeReader = new ZXing.BrowserMultiFormatReader();
      const hint = document.getElementById("hint");
      const flashBtn = document.getElementById("flashBtn");
      let track = null;
      let torch = false;

      async function init() {
        try {
          // один раз запрашиваем разрешение
          await navigator.mediaDevices.getUserMedia({ video: true });

          const devices = await codeReader.listVideoInputDevices();

          let deviceId = null;

          // ищем macro/close/back камеру
          for (const d of devices) {
            const label = d.label.toLowerCase();
            if (
              label.includes("macro") ||
              label.includes("close") ||
              label.includes("back")
            ) {
              deviceId = d.deviceId;
              break;
            }
          }
          // fallback на первую камеру
          if (!deviceId && devices.length > 0) deviceId = devices[0].deviceId;

          const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId } },
          });
          video.srcObject = stream;
          track = stream.getVideoTracks()[0];

          startScan();
        } catch (e) {
          hint.innerText = "Ошибка камеры: " + e.message;
        }
      }

      function startScan() {
        codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
          if (result) {
            if (navigator.vibrate) navigator.vibrate(200);
            hint.innerText = "Код считан";
            setTimeout(() => {
              window.Telegram.WebApp.sendData(result.text);
              window.Telegram.WebApp.close();
            }, 500);
          }
        });
      }

      // фонарик
      flashBtn.onclick = async () => {
        try {
          const capabilities = track.getCapabilities();
          if (!capabilities.torch) {
            hint.innerText = "Фонарик не поддерживается";
            return;
          }
          torch = !torch;
          await track.applyConstraints({ advanced: [{ torch: torch }] });
        } catch (e) {}
      };

      init();
    </script>
  </body>
</html>
