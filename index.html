<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>QR Scanner</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: black;
        height: 100%;
        overflow: hidden;
        font-family: system-ui;
      }

      #container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .scan {
        width: 260px;
        height: 260px;
        border: 2px solid white;
        border-radius: 16px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.55);
        z-index: 2;
      }

      #hint {
        position: absolute;
        bottom: 120px;
        color: white;
        background: rgba(0, 0, 0, 0.6);
        padding: 12px 18px;
        border-radius: 20px;
        font-size: 14px;
        text-align: center;
        max-width: 300px;
      }

      #flash {
        position: absolute;
        bottom: 40px;
        background: white;
        border: none;
        border-radius: 30px;
        padding: 12px 20px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div id="container">
      <video id="video" autoplay playsinline></video>

      <canvas id="overlay"></canvas>

      <div class="scan"></div>

      <div id="hint">
        держите объект на расстоянии 10-15см и наведите внутреннюю рамку на QR
        код
      </div>

      <button id="flash">Фонарик</button>
    </div>

    <script>
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");

      const hint = document.getElementById("hint");
      const flashBtn = document.getElementById("flash");

      const codeReader = new ZXing.BrowserMultiFormatReader();

      let track = null;
      let torch = false;

      init();

      async function init() {
        try {
          /* один запрос камеры */

          await navigator.mediaDevices.getUserMedia({ video: true });

          /* список камер */

          const devices = await codeReader.listVideoInputDevices();

          /* поиск macro камеры */

          let deviceId = null;

          for (const d of devices) {
            const label = d.label.toLowerCase();

            if (label.includes("macro") || label.includes("close")) {
              deviceId = d.deviceId;
              break;
            }
          }

          /* если нет macro ищем заднюю */

          if (!deviceId) {
            for (const d of devices) {
              const label = d.label.toLowerCase();

              if (
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
              ) {
                deviceId = d.deviceId;
                break;
              }
            }
          }

          /* fallback */

          if (!deviceId) {
            deviceId = devices[0].deviceId;
          }

          /* запуск камеры */

          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              deviceId: { exact: deviceId },
              focusMode: "continuous",
            },
          });

          video.srcObject = stream;

          track = stream.getVideoTracks()[0];

          resizeCanvas();

          startScanner();
        } catch (e) {
          hint.innerText = "Ошибка камеры: " + e.message;
        }
      }

      function resizeCanvas() {
        canvas.width = video.clientWidth;
        canvas.height = video.clientHeight;
      }

      window.addEventListener("resize", resizeCanvas);

      function startScanner() {
        codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          if (result) {
            drawBox(result.resultPoints);

            navigator.vibrate?.(200);

            hint.innerText = "Код считан";

            setTimeout(() => {
              window.Telegram.WebApp.sendData(result.text);
              window.Telegram.WebApp.close();
            }, 500);
          }
        });
      }

      function drawBox(points) {
        if (!points) return;

        ctx.strokeStyle = "white";
        ctx.lineWidth = 4;

        ctx.beginPath();

        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }

        ctx.closePath();
        ctx.stroke();
      }

      /* фонарик */

      flashBtn.onclick = async () => {
        try {
          const cap = track.getCapabilities();

          if (!cap.torch) {
            hint.innerText = "Фонарик не поддерживается";
            return;
          }

          torch = !torch;

          await track.applyConstraints({
            advanced: [{ torch: torch }],
          });
        } catch (e) {}
      };
    </script>
  </body>
</html>
