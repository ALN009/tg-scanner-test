<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Сканер DataMatrix</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: system-ui;
      }

      #video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      .scan-area {
        position: relative;
        width: 260px;
        height: 260px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.55);
        z-index: 2;
        overflow: hidden;
      }

      .laser {
        width: 100%;
        height: 2px;
        background: #33a852;
        box-shadow: 0 0 10px #33a852;
        position: absolute;
        top: 0;
        animation: scan 2s infinite linear alternate;
      }

      @keyframes scan {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(258px);
        }
      }

      #hint {
        margin-top: 40px;
        color: white;
        font-size: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        border-radius: 20px;
        z-index: 2;
      }

      .controls {
        position: absolute;
        bottom: 40px;
        display: flex;
        gap: 15px;
        z-index: 3;
      }

      button {
        border: none;
        padding: 12px 18px;
        border-radius: 12px;
        font-size: 14px;
        background: #33a852;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>

      <div class="scan-area">
        <div class="laser"></div>
      </div>

      <div id="hint">Наведите камеру на код</div>

      <div class="controls">
        <button id="switchCamera">Сменить камеру</button>
        <button id="flashBtn">Фонарик</button>
      </div>
    </div>

    <script>
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const codeReader = new ZXing.BrowserMultiFormatReader();

      const video = document.getElementById("video");
      const hint = document.getElementById("hint");
      const switchBtn = document.getElementById("switchCamera");
      const flashBtn = document.getElementById("flashBtn");

      let devices = [];
      let currentCamera = 0;
      let scanning = true;
      let torchEnabled = false;
      let track = null;

      const SCAN_TIMEOUT = 5000;

      async function initScanner() {
        devices = await codeReader.listVideoInputDevices();

        if (devices.length === 0) {
          hint.innerText = "Камера не найдена";
          return;
        }

        /* пытаемся найти заднюю камеру */

        let backIndex = devices.findIndex(
          (d) =>
            d.label.toLowerCase().includes("back") ||
            d.label.toLowerCase().includes("rear") ||
            d.label.toLowerCase().includes("environment"),
        );

        currentCamera = backIndex !== -1 ? backIndex : 0;

        startCamera();
      }

      function startCamera() {
        scanning = true;

        codeReader.decodeFromVideoDevice(
          devices[currentCamera].deviceId,
          video,
          (result, err) => {
            if (result) {
              scanning = false;

              if (navigator.vibrate) navigator.vibrate(200);

              hint.innerText = "Код считан";

              window.Telegram.WebApp.sendData(result.text);

              setTimeout(() => {
                window.Telegram.WebApp.close();
              }, 500);
            }
          },
        );

        setTimeout(() => {
          if (scanning) {
            currentCamera++;

            if (currentCamera >= devices.length) {
              hint.innerText = "Не удалось распознать изображение";
              codeReader.reset();
              return;
            }

            hint.innerText = "Пробуем другую камеру";

            codeReader.reset();
            startCamera();
          }
        }, SCAN_TIMEOUT);

        setTimeout(setupTorch, 1000);
      }

      function switchCamera() {
        codeReader.reset();

        currentCamera++;

        if (currentCamera >= devices.length) currentCamera = 0;

        hint.innerText = "Переключение камеры";

        startCamera();
      }

      switchBtn.onclick = switchCamera;

      async function setupTorch() {
        try {
          track = video.srcObject.getVideoTracks()[0];

          const capabilities = track.getCapabilities();

          if (capabilities.torch) {
            flashBtn.style.display = "block";
          } else {
            flashBtn.style.display = "none";
          }
        } catch {}
      }

      flashBtn.onclick = async () => {
        if (!track) return;

        torchEnabled = !torchEnabled;

        await track.applyConstraints({
          advanced: [{ torch: torchEnabled }],
        });
      };

      initScanner();
    </script>
  </body>
</html>
