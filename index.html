<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Сканер DataMatrix</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: system-ui;
      }

      #video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      /* canvas для рамки */
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
      }

      .scan-area {
        position: relative;
        width: 260px;
        height: 260px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.55);
        z-index: 2;
        overflow: hidden;
      }

      .laser {
        width: 100%;
        height: 2px;
        background: #33a852;
        box-shadow: 0 0 10px #33a852;
        position: absolute;
        top: 0;
        animation: scan 2s infinite linear alternate;
      }

      @keyframes scan {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(258px);
        }
      }

      #hint {
        margin-top: 40px;
        color: white;
        font-size: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        border-radius: 20px;
        z-index: 2;
      }

      /* кнопка фонарика */

      #flashBtn {
        position: absolute;
        bottom: 40px;
        z-index: 4;
        background: #ffffff;
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>

      <canvas id="overlay"></canvas>

      <div class="scan-area">
        <div class="laser"></div>
      </div>

      <div id="hint">Наведите камеру на код</div>

      <button id="flashBtn">🔦 Фонарик</button>
    </div>

    <script>
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const codeReader = new ZXing.BrowserMultiFormatReader();

      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");

      const hint = document.getElementById("hint");
      const flashBtn = document.getElementById("flashBtn");

      let track = null;
      let torch = false;

      init();

      async function init() {
        try {
          await navigator.mediaDevices.getUserMedia({ video: true });

          const devices = await codeReader.listVideoInputDevices();

          let deviceId = devices[0].deviceId;

          for (const d of devices) {
            const label = d.label.toLowerCase();

            if (
              label.includes("back") ||
              label.includes("rear") ||
              label.includes("environment")
            ) {
              deviceId = d.deviceId;
              break;
            }
          }

          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              deviceId: deviceId,
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
          });

          video.srcObject = stream;

          track = stream.getVideoTracks()[0];

          resizeCanvas();

          startScan();
        } catch (err) {
          hint.innerText = "Ошибка камеры: " + err.message;
        }
      }

      function resizeCanvas() {
        canvas.width = video.clientWidth;
        canvas.height = video.clientHeight;
      }

      window.addEventListener("resize", resizeCanvas);

      function startScan() {
        codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          if (result) {
            drawBox(result.resultPoints);

            if (navigator.vibrate) navigator.vibrate(200);

            hint.innerText = "Код считан";

            setTimeout(() => {
              window.Telegram.WebApp.sendData(result.text);
              window.Telegram.WebApp.close();
            }, 500);
          }
        });
      }

      function drawBox(points) {
        if (!points) return;

        ctx.strokeStyle = "white";
        ctx.lineWidth = 4;

        ctx.beginPath();

        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }

        ctx.closePath();
        ctx.stroke();
      }

      /* кнопка фонарика */

      flashBtn.onclick = async () => {
        try {
          const capabilities = track.getCapabilities();

          if (!capabilities.torch) {
            hint.innerText = "Фонарик не поддерживается";

            return;
          }

          torch = !torch;

          await track.applyConstraints({
            advanced: [{ torch: torch }],
          });
        } catch (e) {
          console.log(e);
        }
      };
    </script>
  </body>
</html>
