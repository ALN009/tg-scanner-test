<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Сканер DataMatrix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: system-ui;
      }

      #video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
      }

      /* Затемняющий overlay с "окном" */
      .scan-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        pointer-events: none;
        z-index: 2;
        -webkit-transform: translateZ(0);
        mask-image: radial-gradient(
          circle 130px at center,
          transparent 0%,
          black 100%
        );
        -webkit-mask-image: radial-gradient(
          circle 130px at center,
          transparent 0%,
          black 100%
        );
      }

      .scan-area {
        position: absolute;
        width: 260px;
        height: 260px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        z-index: 3;
        display: flex;
        justify-content: center;
        align-items: center;
        -webkit-transform: translateZ(0);
      }

      .mini-area {
        width: 100px;
        height: 100px;
        border: 2px solid #fff;
        border-radius: 10px;
        background-color: #fff;
        opacity: 0.3;
      }

      .laser {
        width: 100%;
        height: 2px;
        background: #33a852;
        box-shadow: 0 0 10px #33a852;
        position: absolute;
        top: 0;
        animation: scan 2s infinite linear alternate;
      }

      @keyframes scan {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(258px);
        }
      }

      #hint {
        position: absolute;
        bottom: 120px;
        color: white;
        font-size: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        border-radius: 20px;
        z-index: 4;
        text-align: center;
        max-width: 300px;
      }

      #flashBtn {
        position: absolute;
        bottom: 40px;
        z-index: 4;
        background: #fff;
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>

      <!-- Overlay затемнения с прозрачным центром -->
      <div class="scan-overlay"></div>

      <!-- Рамка сканирования -->
      <div class="scan-area">
        <div class="laser"></div>
        <div class="mini-area"></div>
      </div>

      <div id="hint">
        Наведите рамку на QR-код<br />
        Держите объект на расстоянии 10-15 см
      </div>
      <button id="flashBtn">Фонарик</button>
    </div>

    <script>
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();

      const video = document.getElementById("video");
      const hint = document.getElementById("hint");
      const flashBtn = document.getElementById("flashBtn");
      const codeReader = new ZXing.BrowserMultiFormatReader();

      let track = null;
      let torch = false;

      async function init() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = stream;
          track = stream.getVideoTracks()[0];

          startScan();
        } catch (e) {
          hint.innerText = "Ошибка камеры: " + e.message;
        }
      }

      function startScan() {
        codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
          if (result) {
            if (navigator.vibrate) navigator.vibrate(200);
            hint.innerText = "Код считан";
            setTimeout(() => {
              window.Telegram.WebApp.sendData(result.text);
              window.Telegram.WebApp.close();
            }, 500);
          }
        });
      }

      flashBtn.onclick = async () => {
        try {
          if (!track) return;
          const cap = track.getCapabilities();
          if (!cap.torch) {
            hint.innerText = "Фонарик не поддерживается";
            return;
          }
          torch = !torch;
          await track.applyConstraints({ advanced: [{ torch: torch }] });
        } catch (e) {
          console.log(e);
        }
      };

      init();
    </script>
  </body>
</html>
